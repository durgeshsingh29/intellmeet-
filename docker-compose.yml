services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  server:
    build: ./server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/intellmeet
      JWT_SECRET: replace_with_a_long_random_secret
      CLIENT_URL: http://localhost:5173
      AI_PROVIDER: mock
    depends_on:
      - mongo

volumes:
  mongo-data:
